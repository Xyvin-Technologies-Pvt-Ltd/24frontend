name: Deploy Admin Panel (Prod)

on:
  push:
    branches: ["prod"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Configure AWS credentials (existing secrets)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 3️⃣ Login to Amazon ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 4️⃣ Build and push Docker image
    - name: Build and push image
      run: |
        REGISTRY="$(echo "${{ secrets.ECR_REGISTRY }}" | tr -d ' \n')"
        REPO="$(echo "${{ secrets.ECR_REPOSITORY }}" | tr -d ' \n')"
        IMAGE="${REGISTRY}/${REPO}:latest"

        echo "Building image: $IMAGE"

        docker build \
          --build-arg VITE_BASE_URL=${{ secrets.VITE_API_URL_PROD }} \
          --build-arg VITE_API_KEY=${{ secrets.VITE_API_KEY }} \
          -t "$IMAGE" .

        docker push "$IMAGE"

    # 5️⃣ Trigger ASG rolling instance refresh
    - name: Trigger ASG instance refresh
      run: |
        aws autoscaling start-instance-refresh \
          --auto-scaling-group-name "${{ secrets.ASG_NAME }}" \
          --strategy Rolling
